<!doctype html>
<html lang="id">
<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reset Password SIPANDA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top left, rgba(59,130,246,.35), transparent 30%),
    radial-gradient(circle at bottom right, rgba(96,165,250,.25), transparent 30%),
    linear-gradient(135deg,#081120,#0f1f3d,#1e3a5f);
}

/* CARD */

.card{
    width:100%;

    max-width:460px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border-radius:35px;

    padding:40px;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

/* TITLE */

h1{
    color:white;

    text-align:center;

    margin-bottom:10px;
}

p{
    color:#cbd5e1;

    text-align:center;

    margin-bottom:30px;
}

/* ALERT */

.alert{
    background:#fee2e2;

    color:#991b1b;

    padding:14px;

    border-radius:14px;

    margin-bottom:18px;
}

/* INPUT */

.input{
    width:100%;

    height:58px;

    border:none;

    outline:none;

    border-radius:16px;

    padding:0 20px;

    margin-bottom:18px;

    background:rgba(255,255,255,.10);

    border:1px solid rgba(255,255,255,.06);

    color:white;

    font-size:15px;
}

.input::placeholder{
    color:#dbeafe;
}

/* BUTTON */

.btn{
    width:100%;

    height:58px;

    border:none;

    border-radius:16px;

    background:linear-gradient(135deg,#2563eb,#60a5fa);

    color:white;

    font-size:16px;

    font-weight:700;

    cursor:pointer;
}

/* BACK */

.back{
    display:block;

    text-align:center;

    margin-top:20px;

    color:#bfdbfe;

    text-decoration:none;
}

.back:hover{
    color:white;
}

/* MOBILE */

@media(max-width:600px){

    .card{
        padding:30px 25px;
    }

}

</style>

</head>

<body>

<form class="card" method="post">

    <h1>Reset Password</h1>

    <p>
        Masukkan username dan password baru
    </p>

    {% with messages=get_flashed_messages(with_categories=true) %}
    {% for c,m in messages %}

        <div class="alert">
            {{m}}
        </div>

    {% endfor %}
    {% endwith %}

    <input
        class="input"
        name="username"
        placeholder="Username"
        required>

    <input
        class="input"
        type="password"
        name="new_password"
        placeholder="Password Baru"
        required>

    <input
        class="input"
        type="password"
        name="confirm_password"
        placeholder="Konfirmasi Password"
        required>

    <button class="btn">
        Reset Password
    </button>

    <a class="back" href="{{ url_for('login') }}">
        ← Kembali ke Login
    </a>

</form>

</body>
</html>
